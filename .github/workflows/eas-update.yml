name: EAS Update

# Ships an over-the-air JS/asset update to the production channel on every push
# to main. Native code changes still require a new build (see eas-build.yml).
#
# Requires the repo secret EXPO_TOKEN (expo.dev → Account → Access tokens) and a
# one-time `eas update:configure` (populates updates.url + runtimeVersion).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    name: Publish OTA update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        run: eas update --auto --non-interactive
